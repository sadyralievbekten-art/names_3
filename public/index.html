<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Каталог имён</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    .header {
      background: #1f1f1f;
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
    }

    .btn {
      background: #4caf50;
      border: none;
      color: white;
      padding: 6px 12px;
      cursor: pointer;
    }

    .container {
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    .search {
      margin-bottom: 20px;
    }

    input {
      padding: 8px;
      width: 200px;
    }

    .card {
      background: white;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ddd;
    }

    .name {
      font-size: 18px;
      font-weight: bold;
    }

    .tags {
      margin-top: 6px;
    }

    .tag {
      display: inline-block;
      background: #eee;
      padding: 3px 6px;
      margin: 2px;
      border-radius: 4px;
      font-size: 12px;
    }

    .empty {
      text-align: center;
      margin-top: 50px;
      color: #777;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="title">📚 Каталог имён</div>
  <button class="btn" onclick="go('login.html')">Вход</button>
</div>

<div class="container">

  <div class="search">
    <input id="search" placeholder="Поиск имени">
    <button onclick="load()">Найти</button>
    <button onclick="reset()">Сброс</button>
  </div>

  <div id="list"></div>

</div>

<script src="site.js"></script>

</body>
</html>
